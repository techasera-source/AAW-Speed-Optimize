client_id = "REPLACE_WITH_YOUR_CLIENT_ID"
name = "AAW Speed Optimize"
handle = "velocity"
application_url = "https://REPLACE_WITH_YOUR_TUNNEL_URL.trycloudflare.com"
embedded = true

[build]
include_config_on_deploy = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_themes,write_themes,read_products,write_products,read_files,write_files"

[auth]
redirect_urls = [
  "https://REPLACE_WITH_YOUR_TUNNEL_URL.trycloudflare.com/auth/callback",
  "https://REPLACE_WITH_YOUR_TUNNEL_URL.trycloudflare.com/auth/shopify/callback",
  "https://REPLACE_WITH_YOUR_TUNNEL_URL.trycloudflare.com/api/auth/callback"
]

[pos]
embedded = false
